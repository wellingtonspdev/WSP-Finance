name: CI - WSP Finance

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-tests:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: wsp_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/wsp_test_db?schema=public
      DIRECT_URL: postgresql://postgres:password@localhost:5432/wsp_test_db?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm -v

      - name: Install dependencies (Backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Strict Typecheck (TSC)
        working-directory: ./backend
        run: pnpm exec tsc --noEmit

      - name: Setup Database (Migrate & Seed)
        working-directory: ./backend
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Run tests with coverage (Backend)
        working-directory: ./backend
        run: pnpm test -- --coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage/**
          if-no-files-found: warn

  frontend-tests:
    name: Frontend Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug opcional (mantém por enquanto)
      - name: Debug - show commit and key files
        shell: bash
        run: |
          echo "==== GIT INFO ===="
          echo "GITHUB_SHA: $GITHUB_SHA"
          git rev-parse HEAD
          git --no-pager log -1 --oneline
          echo ""
          echo "==== FRONTEND vite.config.ts (first 220 lines) ===="
          sed -n '1,220p' frontend/vite.config.ts || true
          echo ""
          echo "==== Grep: vitest excludes ===="
          rg "exclude:\s*\[" -n frontend/vite.config.ts || true
          rg "tests/e2e" -n frontend/vite.config.ts || true
          echo ""
          echo "==== Grep: 403 message ===="
          rg "Acesso negado ou anexo indisponível" -n frontend/src || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm -v

      - name: Install dependencies (Frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage (Frontend)
        working-directory: ./frontend
        run: pnpm test -- --coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/**
          if-no-files-found: warn

  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Debug - list coverage outputs
        shell: bash
        run: |
          echo "==== Coverage files (backend) ===="
          find backend/coverage -maxdepth 4 -type f -name "lcov.info" -print || true
          echo ""
          echo "==== Coverage files (frontend) ===="
          find frontend/coverage -maxdepth 4 -type f -name "lcov.info" -print || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        continue-on-error: true
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
