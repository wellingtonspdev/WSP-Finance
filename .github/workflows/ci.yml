name: CI - WSP Finance

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-tests:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies (Backend)
        working-directory: ./beckend
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage (Backend)
        working-directory: ./beckend
        run: pnpm test -- --coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            beckend/coverage/**
          if-no-files-found: warn


  frontend-tests:
    name: Frontend Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ PASSO 3: DEBUG explícito
      - name: Debug - show commit and key files
        shell: bash
        run: |
          echo "==== GIT INFO ===="
          echo "GITHUB_SHA: $GITHUB_SHA"
          git rev-parse HEAD
          git --no-pager log -1 --oneline
          echo ""
          echo "==== FRONTEND vite.config.ts (first 220 lines) ===="
          sed -n '1,220p' frontend/vite.config.ts || true
          echo ""
          echo "==== Grep: vitest excludes ===="
          rg "exclude:\s*\[" -n frontend/vite.config.ts || true
          rg "tests/e2e" -n frontend/vite.config.ts || true
          echo ""
          echo "==== Grep: 403 message ===="
          rg "Acesso negado ou anexo indisponível" -n frontend/src || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies (Frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage (Frontend)
        working-directory: ./frontend
        run: pnpm test -- --coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/**
          if-no-files-found: warn


  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies (Frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./frontend
        run: pnpm test:e2e


  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    if: ${{ github.event_name == 'pull_request' }}

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: beckend/coverage

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Debug - list coverage outputs
        shell: bash
        run: |
          echo "==== Coverage files (backend) ===="
          ls -la beckend/coverage || true
          find beckend/coverage -maxdepth 3 -type f -name "lcov.info" -print || true
          echo ""
          echo "==== Coverage files (frontend) ===="
          ls -la frontend/coverage || true
          find frontend/coverage -maxdepth 3 -type f -name "lcov.info" -print || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}