<!DOCTYPE html>

<html lang="pt-BR"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Redefinir Senha - WSP Finance</title>
    <!-- Tailwind CSS v3 with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Configuration for Custom Colors/Fonts -->
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'wsp-dark': '#2A0A4A',
                'wsp-light': '#4c1d95', // Approximate lighter blue-purple
                'wsp-input-bg': 'rgba(255, 255, 255, 0.1)',
                'wsp-success': '#22c55e', // Bright green
              },
              fontFamily: {
                sans: ['Inter', 'Roboto', 'SF Pro', 'sans-serif'],
              }
            }
          }
        }
    </script>
    <!-- BEGIN: Custom Styles -->
    <style data-purpose="background-gradient">
        body {
          background: linear-gradient(180deg, #180033 0%, #0c001a 100%);
          min-height: 100vh;
          color: white;
          font-family: 'Inter', sans-serif;
        }
    </style>
    <style data-purpose="form-elements">
        /* Custom styling for inputs to match the glass-morphism look */
        .custom-input {
          background-color: rgba(255, 255, 255, 0.1);
          border: 1px solid rgba(255, 255, 255, 0.2);
          color: white;
        }
        .custom-input:focus {
          background-color: rgba(255, 255, 255, 0.15);
          border-color: rgba(255, 255, 255, 0.5);
          outline: none;
          box-shadow: none;
        }
        .custom-input::placeholder {
          color: rgba(255, 255, 255, 0.5);
        }
    </style>
    <!-- END: Custom Styles -->
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col antialiased relative">
<!-- BEGIN: Header Section -->
<!-- Contains the back navigation and screen title -->
<header class="relative flex items-center justify-center px-4 py-6 w-full" data-purpose="navigation-header">
    <button aria-label="Voltar" class="absolute left-4 text-white p-2 hover:bg-white/10 rounded-full transition-colors" type="button">
        <i class="fa-solid fa-chevron-left text-xl"></i>
    </button>
    <h1 class="text-xl font-bold text-white tracking-wide">Redefinir Senha</h1>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Main Content -->
<main class="flex-grow flex flex-col items-center px-6 w-full max-w-md mx-auto" data-purpose="main-content">
    <!-- Logo Area -->
    <div class="mb-10 mt-4 flex justify-center w-full" data-purpose="brand-logo">
        <div class="flex flex-col items-center justify-center">
            <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#d946ef] to-[#3b82f6]" style="font-family: sans-serif; font-weight: 900;">WSP</h1>
            <span class="text-sm tracking-[0.5em] font-medium text-white/80 mt-1">FINANCE</span>
        </div>
    </div>
    <!-- Instruction Text -->
    <div class="text-center mb-10" data-purpose="instructions">
        <p class="text-white/90 text-[15px] leading-relaxed font-light">
            Insira o token de 6 dígitos recebido e crie uma nova senha.
        </p>
    </div>
    <!-- BEGIN: Reset Password Form -->
    <form class="w-full space-y-6" data-purpose="reset-password-form" onsubmit="event.preventDefault();">
        <!-- Field: Token -->
        <div class="space-y-2 mb-[30px]" data-purpose="field-token">
            <label class="block text-sm font-medium text-white/90 ml-1" for="token">Token (6 dígitos)</label>
            <div class="relative">
                <input class="custom-input w-full rounded-xl py-4 px-4 text-[40px] tracking-[8px] font-black text-center placeholder-white/20 h-20 flex items-center justify-center" id="token" name="token" placeholder="......" readonly="" type="text" value="••••••"/>
            </div>
        </div>
        <!-- Field: New Password -->
        <div class="space-y-2" data-purpose="field-new-password">
            <label class="block text-sm font-medium text-white/90 ml-1" for="new-password">Nova Senha</label>
            <div class="relative flex items-center">
                <input class="custom-input w-full rounded-xl py-3.5 pl-4 pr-12 text-base" id="new-password" name="new_password" placeholder="Secure text field" type="password"/>
                <svg style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; fill: rgba(255, 255, 255, 0.6); pointer-events: none;" viewbox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
            </div>
        </div>
        <!-- Field: Confirm Password -->
        <div class="space-y-2" data-purpose="field-confirm-password">
            <label class="block text-sm font-medium text-white/90 ml-1" for="confirm-password">Confirmar Nova Senha</label>
            <div class="relative flex items-center">
                <input class="custom-input w-full rounded-xl py-3.5 pl-4 pr-12 text-base" id="confirm-password" name="confirm_password" placeholder="Secure text field" type="password"/>
                <svg style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; fill: rgba(255, 255, 255, 0.6); pointer-events: none;" viewbox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
            </div>
        </div>
        <!-- Action Button -->
        <div class="pt-4" data-purpose="submit-action">
            <button class="w-full bg-gradient-to-r from-[#d946ef] to-[#3b82f6] text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl hover:opacity-90 transition-all text-lg tracking-wide" type="submit">
                Alterar Senha
            </button>
        </div>
    </form>
    <!-- END: Reset Password Form -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Success Message Notification -->
<!-- Fixed at bottom, bright green background -->
<div class="fixed bottom-0 left-0 w-full bg-wsp-success p-6 shadow-lg animate-bounce-in-up flex items-center justify-center z-50" data-purpose="success-notification">
    <div class="flex flex-col items-center justify-center text-white font-medium text-center space-y-1">
        <i class="fa-solid fa-circle-check text-2xl mb-1"></i>
        <span>Senha alterada com sucesso!<br/><span class="text-sm opacity-90">Redirecionando...</span></span>
    </div>
</div>
<!-- END: Success Message Notification -->
</body></html>
