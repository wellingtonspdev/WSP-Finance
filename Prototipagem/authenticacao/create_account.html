<!DOCTYPE html>

<html lang="pt-BR"><head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>WSP Finance Sign Up</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- BEGIN: Custom Font and Color Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'deep-violet': '#1a0b2e',
            'light-purple': '#5e1b55',
            'royal-blue': '#2b3990',
            'glass-border': 'rgba(255, 255, 255, 0.3)',
            'glass-bg': 'rgba(255, 255, 255, 0.05)',
            'placeholder': 'rgba(255, 255, 255, 0.6)',
            'brand-pink': '#d946ef', // Approximation for gradient
            'brand-cyan': '#06b6d4', // Approximation for gradient
          }
        }
      }
    }
  </script>
  <!-- END: Custom Font and Color Configuration -->
  <!-- BEGIN: Custom Styles for Gradient and Glassmorphism -->
  <style data-purpose="background-styles">
    body {
      background: linear-gradient(180deg, #1A0B2E 0%, #2D1B4E 60%, #1A237E 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: white;
    }
  </style>
  <style data-purpose="glass-inputs">
    .glass-input-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
    }

    .glass-input-container::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Remove default autofill background in WebKit */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px #2d1b4e inset !important;
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    .btn-gradient {
      background: linear-gradient(90deg, #d946ef 0%, #3b82f6 100%);
    }
  </style>
  <!-- END: Custom Styles -->
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-sans antialiased flex flex-col justify-between items-center px-6 py-10 min-h-screen">
<!-- BEGIN: Main Content Wrapper -->
<main class="w-full max-w-md flex flex-col items-center flex-grow justify-center gap-8">
  <!-- BEGIN: Header Section (Logo & Title) -->
  <header class="w-full flex flex-col items-center gap-6" data-purpose="header-section">
    <!-- Logo Container -->
    <div class="flex flex-col items-center gap-2">
      <!-- Logo Image -->
      <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#e879f9] to-[#3b82f6] mb-1 tracking-tighter">WSP</h1>
      <!-- Subtitle Text -->
      <span class="text-xs font-bold uppercase opacity-90" style="color: #e879f9; letter-spacing: 2px;">
          Finance
        </span>
    </div>
    <!-- Page Title -->
    <h1 class="text-3xl font-bold text-white mt-4">Crie sua conta</h1>
  </header>
  <!-- END: Header Section -->
  <!-- BEGIN: Sign Up Form -->
  <form action="#" class="w-full flex flex-col gap-5 mt-2" data-purpose="signup-form" method="POST">
    <!-- Input Group: Full Name -->
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <!-- Icon: User -->
        <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <input class="w-full glass-input-container rounded-full py-4 pl-12 pr-4 text-white placeholder-placeholder focus:outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400 transition-all" placeholder="Nome Completo" type="text"/>
    </div>
    <!-- Input Group: Email -->
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <!-- Icon: Envelope -->
        <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <input class="w-full glass-input-container rounded-full py-4 pl-12 pr-4 text-white placeholder-placeholder focus:outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400 transition-all" placeholder="E-mail" type="email"/>
    </div>
    <!-- Input Group: Password -->
    <div class="relative group flex flex-col">
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <!-- Icon: Lock -->
          <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <input class="w-full glass-input-container rounded-full py-4 pl-12 pr-12 text-white placeholder-placeholder focus:outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400 transition-all" placeholder="Senha" type="password" value="123456"/>
        <!-- Validation Icon -->
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
          <div class="bg-green-500 rounded-full p-0.5">
            <svg class="w-3 h-3" fill="none" stroke="white" stroke-width="3" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.5 12.75l6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
        </div>
      </div>
      <!-- Helper Text -->
      <span class="text-xs text-gray-400 ml-6 mt-1 self-start">6+ caracteres</span>
    </div>
    <!-- Input Group: Confirm Password -->
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <!-- Icon: Lock -->
        <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <input class="w-full glass-input-container rounded-full py-4 pl-12 pr-12 text-white placeholder-placeholder focus:outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400 transition-all" placeholder="Confirmar Senha" type="password" value="123456"/>
      <!-- Validation Icon -->
      <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
        <div class="bg-green-500 rounded-full p-0.5">
          <svg class="w-3 h-3" fill="none" stroke="white" stroke-width="3" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.5 12.75l6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
      </div>
    </div>
    <!-- Action Button -->
    <button class="mt-4 w-full btn-gradient py-4 rounded-full text-white font-bold text-lg shadow-lg hover:shadow-xl hover:opacity-90 transition-all transform active:scale-[0.98]" type="button">
      Criar Conta
    </button>
  </form>
  <!-- END: Sign Up Form -->
</main>
<!-- END: Main Content Wrapper -->
</body></html>
