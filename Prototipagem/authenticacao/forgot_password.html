<!DOCTYPE html>

<html lang="pt-BR"><head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Esqueceu sua senha - Financeiro</title>
  <!-- Tailwind CSS v3 with Plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Custom Configuration for Fonts and Colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'custom-purple': '#8e44ad',
            'custom-blue': '#2980b9',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <!-- Custom CSS for specific gradients and layout tweaks not covered by standard Tailwind utilities -->
  <style data-purpose="custom-styling">
    /* Main Background Gradient matching the reference image */
    body {
      background: linear-gradient(160deg, #2e003e 0%, #1a0b2e 50%, #112240 100%);
      background-attachment: fixed;
    }

    /* Gradient Button */
    .btn-gradient {
      background: linear-gradient(90deg, #c030b0 0%, #4070e0 100%);
      transition: opacity 0.3s ease;
    }

    .btn-gradient:active {
      opacity: 0.9;
    }

    /* Input Styling */
    .glass-input {
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
    }

    .glass-input:focus-within {
      border-color: rgba(255, 255, 255, 0.6);
      background-color: rgba(255, 255, 255, 0.15);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white font-sans antialiased overflow-hidden">
<!-- BEGIN: Main Container -->
<!-- This container centers content vertically and horizontally, providing padding consistent with mobile views -->
<main class="w-full max-w-[360px] px-6 py-8 flex flex-col min-h-screen justify-center mx-auto" data-purpose="app-container">
  <!-- BEGIN: Header Section -->
  <!-- Contains the Logo centered at the top -->
  <header class="flex justify-center pt-8 mb-8" data-purpose="logo-header"><div class="flex items-center gap-2">
    <div class="font-black text-4xl tracking-tighter" style="background: linear-gradient(135deg, #da54d8 0%, #6f42c1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Arial Black', sans-serif;">G</div>
    <div class="font-bold text-xl tracking-wide uppercase" style="color: #536dfe;">FINANCEIRO</div>
  </div></header>
  <!-- END: Header Section -->
  <!-- BEGIN: Content Section -->
  <!-- Contains the core messaging and the form -->
  <section class="flex flex-col items-center flex-grow justify-center -mt-20" data-purpose="main-content"><!-- Title & Subtitle -->
    <div class="text-center mb-8">
      <h1 class="font-bold text-white leading-tight" style="font-size: 28px; margin-bottom: 16px;">Esqueceu sua<br/>senha?</h1>
      <p class="text-center leading-relaxed px-2" style="font-size: 14px; color: #b0b0d0;">
        Insira seu e-mail e enviaremos um código para você redefinir sua senha.
      </p>
    </div>
    <!-- Form -->
    <form class="w-full flex flex-col gap-6" onsubmit="event.preventDefault();">
      <!-- Email Input -->
      <div class="w-full">
        <label class="block text-sm text-gray-300 mb-2 ml-1" for="email">E-mail</label>
        <div class="relative flex items-center overflow-hidden transition-all w-full" style="background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; height: 50px;">
          <!-- Icon -->
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" style="color: rgba(255, 255, 255, 0.7);" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
          </div>
          <!-- Input Field -->
          <input class="block w-full pl-10 pr-4 bg-transparent border-none focus:ring-0 h-full" id="email" name="email" placeholder="exemplo@email.com" required="" style="color: #ffffff; font-size: 15px;" type="email"/>
          <style>
            /* Placeholder styling specific to this input */
            #email::placeholder { color: rgba(255, 255, 255, 0.5); }
          </style>
        </div>
      </div>
      <!-- Submit Button -->
      <button class="w-full font-bold text-white uppercase tracking-wide transition-opacity hover:opacity-90" style="background: linear-gradient(90deg, #b030b0 0%, #4070e0 100%); height: 50px; border-radius: 8px; font-size: 16px; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);" type="submit">
        Enviar Código
      </button>
    </form></section>
  <!-- END: Content Section -->
  <!-- BEGIN: Footer Section -->
  <!-- Navigation link back to login -->
  <footer class="text-center" style="margin-top: 32px;">
    <a class="inline-block hover:opacity-80 transition-opacity" href="#" style="font-size: 14px; text-decoration: underline; color: #ffffff;">
      Voltar ao Login
    </a>
  </footer>
  <!-- END: Footer Section -->
</main>
<!-- END: Main Container -->
</body></html>
