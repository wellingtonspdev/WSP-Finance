<!DOCTYPE html>

<html lang="pt-BR"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - WSP Finance</title>
    <!-- Tailwind CSS with Forms & Container Queries -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Configuration for Custom Colors and Fonts -->
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'wsp-bg-start': '#1e0b36', // Deep purple
                'wsp-bg-end': '#1a225a',   // Dark blue
                'glass-bg': 'rgba(255, 255, 255, 0.1)',
                'glass-border': 'rgba(255, 255, 255, 0.2)',
                'btn-start': '#b92b9c', // Magenta/Pink
                'btn-end': '#3b5bdb',   // Blue
              },
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
              },
            },
          },
        }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <!-- Custom Styles for Gradient and Glassmorphism -->
    <style data-purpose="page-theme">
        body {
          background: linear-gradient(to bottom, #1e1b4b, #312e81);
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          color: white;
        }

        /* Custom Placeholder Color */
        .custom-placeholder::placeholder {
          color: rgba(255, 255, 255, 0.6);
        }

        /* Ensure the background covers the whole screen on mobile without scrolling if possible */
        html, body {
          height: 100%;
          overflow: hidden;
        }
    </style>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 relative">
<!-- BEGIN: Main Container -->
<main class="w-full max-w-sm flex flex-col items-center space-y-12 z-10" data-purpose="login-container">
    <!-- BEGIN: Logo Section -->
    <header class="flex flex-col items-center justify-center mb-10" data-purpose="logo-area">
        <div class="flex flex-col items-center justify-center">
            <!-- WSP Text Logo -->
            <h1 class="text-[5rem] font-black tracking-tighter leading-none text-transparent bg-clip-text bg-gradient-to-r from-[#ff00cc] to-[#3333ff] select-none" style="font-family: 'Montserrat', 'Verdana', sans-serif;">
                WSP
            </h1>
            <!-- FINANCE Text -->
            <h2 class="mt-2 text-[1.2rem] font-bold tracking-[4px] text-gray-400 uppercase select-none">
                FINANCE
            </h2>
        </div>
    </header>
    <!-- END: Logo Section -->
    <!-- BEGIN: Login Form -->
    <form class="w-full space-y-5" data-purpose="login-form" onsubmit="event.preventDefault();">
        <!-- Email Input Field -->
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <!-- Envelope Icon -->
                <svg class="h-6 w-6 text-gray-300" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                </svg>
            </div>
            <input class="custom-placeholder w-full pl-12 pr-4 py-4 rounded-2xl text-white focus:outline-none focus:ring-0 focus:border-white/50 transition-all shadow-lg backdrop-blur-sm" placeholder="Email" required="" style="background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); height: 56px;" type="email"/>
        </div>
        <!-- Password Input Field -->
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <!-- Lock Icon -->
                <svg class="h-6 w-6 text-gray-300" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                </svg>
            </div>
            <input class="custom-placeholder w-full pl-12 pr-12 py-4 rounded-2xl text-white focus:outline-none focus:ring-0 focus:border-white/50 transition-all shadow-lg backdrop-blur-sm" id="passwordInput" placeholder="Password" required="" style="background-color: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); height: 56px;" type="password"/>
            <!-- Visibility Toggle Button -->
            <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-300 hover:text-white focus:outline-none" onclick="togglePasswordVisibility()" type="button">
                <!-- Eye Icon (Show Password) - visible when password is hidden -->
                <svg class="h-6 w-6" fill="none" id="eyeIcon" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                </svg>
                <!-- Eye Off Icon (Hide Password) - hidden initially -->
                <svg class="h-6 w-6 hidden" fill="none" id="eyeOffIcon" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                </svg>
            </button>
        </div>
        <!-- Submit Button -->
        <div class="pt-4 mb-8">
            <button class="w-full py-4 rounded-full bg-gradient-to-r text-white font-semibold text-lg shadow-lg hover:shadow-xl hover:opacity-90 active:scale-95 transition-all duration-200 from-[#ec4899] to-[#3b82f6]" type="submit">
                Entrar
            </button>
        </div>
    </form>
    <!-- END: Login Form -->
    <!-- BEGIN: Footer Links -->
    <footer class="flex flex-col items-center space-y-6 text-sm" data-purpose="account-actions">
        <div class="flex flex-col items-center space-y-6 mt-4">
            <a class="text-white underline decoration-1 underline-offset-4 hover:text-gray-200 transition-colors text-sm" href="#">
                Esqueci minha senha
            </a>
            <a class="text-white underline decoration-1 underline-offset-4 hover:text-gray-200 transition-colors text-sm" href="#">
                Criar nova conta
            </a>
        </div>
    </footer>
    <!-- END: Footer Links -->
</main>
<!-- END: Main Container -->
<!-- JavaScript for Interactivity -->
<script data-purpose="password-toggle">
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('passwordInput');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeOffIcon = document.getElementById('eyeOffIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.add('hidden');
        eyeOffIcon.classList.remove('hidden');
      } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('hidden');
        eyeOffIcon.classList.add('hidden');
      }
    }
</script>
</body></html>
